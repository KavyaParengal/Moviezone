{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(to right, black,rgb(5, 65, 75), rgb(5, 75, 101));
        }
        p{
            color: white;
            margin: 15px;
            font-size: 35px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 6px 6px grey;
        }

        .login-title {
            font-weight: bold;
            margin-bottom: 20px;
            color: rgb(5, 65, 75);
        }

        .btn-custom {
            background-color: rgb(5, 65, 75);
            color: white;
        }

        .btn-custom:hover {
            background-color: rgb(12, 89, 103);
            color: white;
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
        <div class="container-fluid">

            <!--  Logo + Website Name -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                <img src="{% static 'images/logo.png' %}" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
                <span class="fw-bold" style="color: rgb(10, 69, 80);">MovieZone</span>
            </a>

            <!-- Toggle for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Right Side Icons -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav align-items-center">

                    <!-- home -->
                    <li class="nav-item mx-2">
                        <a href="{% url 'home' %}">
                            <img src="{% static 'images/home.png' %}" alt="Logo" width="30" height="30">
                        </a>
                        </li>

                    <!-- Wishlist -->
                    <li class="nav-item mx-2">
                        <a href="{% url 'favorite_display' %}">
                            <img src="{% static 'images/Wishlist.png' %}" alt="Logo" width="30" height="30">
                        </a>
                    </li>

                    <!-- Profile -->
                    <li class="mx-2 nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#"  id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <img src="{% static 'images/account.png' %}" alt="Logo" width="30" height="30">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="{% url 'profile_view' %}">Profile</a></li>
                                <li><a class="dropdown-item" href="{% url 'single_user_movies' %}">Your movies</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{% url 'logout_user' %}">Logout</a></li>
                        </ul>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center mt-5">
        <div class="login-box col-md-4">
            <h3 class="text-center login-title">Profile Edit</h3>
            {% if messages %}
                {% for message in messages %}
                    {% if forloop.last %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} text-center">
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}
            <form method="POST" action="{% url 'profile_edit' %}">
                {% csrf_token %}
                <div class="mb-2">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{user.first_name}}">
                </div>

                <div class="mb-2">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{user.last_name}}">
                </div>

                <div class="mb-2">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" value="{{user.username}}">
                </div>

                <div class="mb-2">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{user.email}}">
                </div>

                <!-- <div class="mb-2">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" value="{{user.password}}">
                </div> -->

                <div class="d-grid">
                    <button type="submit" class="btn btn-custom">Profile Edit</button>
                </div>

            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
