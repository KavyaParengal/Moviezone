{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, black,rgb(5, 65, 75), rgb(5, 75, 101));
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 6px 6px grey;
        }

        .login-title {
            font-weight: bold;
            margin-bottom: 20px;
            color: rgb(5, 65, 75);
        }

        .btn-custom {
            background-color: rgb(5, 65, 75);
            color: white;
        }

        .btn-custom:hover {
            background-color: rgb(12, 89, 103);
            color: white;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
        <div class="container-fluid">

                <!-- 🔷 Logo + Website Name -->
                <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
                    <span class="fw-bold" style="color: rgb(10, 69, 80);">MovieZone</span>
                </a>

                <!-- Toggle for mobile -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- 🔷 Right Side Icons -->
                <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                    <ul class="navbar-nav align-items-center">

                        <!-- home -->
                        <li class="nav-item mx-2">
                           <a href="{% url 'home' %}">
                                <img src="{% static 'images/home.png' %}" alt="Logo" width="30" height="30">
                           </a>
                        </li>

                        <!-- Wishlist -->
                        <li class="nav-item mx-2">
                           <a href="{% url 'favorite_display' %}">
                                <img src="{% static 'images/Wishlist.png' %}" alt="Logo" width="30" height="30">
                           </a>
                        </li>

                        <!-- Profile -->
                        <li class="mx-2 nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#"  id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <img src="{% static 'images/account.png' %}" alt="Logo" width="30" height="30">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="{% url 'profile_view' %}">Profile</a></li>
                                <li><a class="dropdown-item" href="{% url 'single_user_movies' %}">Your movies</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="{% url 'logout_user' %}">Logout</a></li>
                            </ul>
                        </li>

                    </ul>
                </div>

        </div>
    </nav>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-box col-md-5">

            <h3 class="text-center login-title">Add Movie</h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <input type="text" name="title" class="form-control mb-2" placeholder="Movie Title" required>

                <input type="file" name="poster" class="form-control mb-2" required>

                <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

                <input type="date" name="release_date" class="form-control mb-2">

                <input type="text" name="actors" class="form-control mb-2" placeholder="Actors">

                <input type="number" step="0.1" name="rating" class="form-control mb-2" placeholder="Rating (0-5)">

                <!-- Category Dropdown -->
                <select name="category" class="form-control mb-3">
                    <option value="">Select Category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>

                <input type="url" name="trailer_link" class="form-control mb-3" placeholder="YouTube Trailer Link">

                <div class="d-grid">
                    <button type="submit" class="btn btn-custom">Add Movie</button>
                </div>

            </form>

        </div>
    </div>

</body>
</html>
