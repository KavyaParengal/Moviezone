<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> login - Movie Site</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, black,rgb(5, 65, 75), rgb(5, 75, 101));
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 6px 6px grey;
        }

        .login-title {
            font-weight: bold;
            margin-bottom: 20px;
            color: rgb(5, 65, 75);
        }

        .btn-custom {
            background-color: rgb(5, 65, 75);
            color: white;
        }

        .btn-custom:hover {
            background-color: rgb(12, 89, 103);
            color: white;
        }
        a{
            color: rgb(5, 65, 75);
            font-weight: bold;
        }
        a:hover{
            color: rgb(12, 89, 103);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-box col-md-4">

            <h3 class="text-center login-title">Login</h3>

            {% if messages %}
                {% for message in messages %}
                    {% if forloop.last %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} text-center">
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-custom">Login</button>
                </div>

                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="{% url 'register_user' %}">Register</a></small>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
